<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Schedule Interview</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
display:flex;
font-family: Arial, Helvetica, sans-serif;
}

.sidebar{
width:220px;
height:100vh;
background:#343a40;
color:white;
padding:20px;
}

.sidebar h4{
margin-bottom:20px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-bottom:5px;
border-radius:5px;
}

.sidebar a:hover{
background:#495057;
}

.content{
flex:1;
padding:25px;
background:#f5f6fa;
}

.card{
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>Recruiter Portal</h4>

<a href="dashboard.html"><i class="fa fa-chart-line"></i> Dashboard</a>

<a href="create-job.html"><i class="fa fa-plus"></i> Create Job</a>

<a href="manage-rounds.html"><i class="fa fa-layer-group"></i> Manage Rounds</a>

<a href="schedule-interview.html"><i class="fa fa-calendar"></i> Schedule Interview</a>

<a href="analytics.html"><i class="fa fa-chart-bar"></i> Analytics</a>

<button onclick="logout()" class="btn btn-danger mt-3 w-100">
Logout
</button>

</div>


<!-- Main Content -->

<div class="content">

<h2>Schedule Interview</h2>

<div class="card shadow p-4 mt-4">

<form id="scheduleForm">

<div class="mb-3">
<label class="form-label">Student (Roll No)</label>

<input type="hidden" id="applicationId">

</div>

<div class="mb-3">
<label class="form-label">Round Name</label>
<input type="text" id="roundName" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Date</label>
<input type="date" id="date" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Time</label>
<input type="time" id="time" class="form-control" required>
</div>

<button type="submit" class="btn btn-primary">
<i class="fa fa-calendar"></i> Schedule Interview
</button>

</form>

</div>

</div>

<script src="../js/api.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const applicationId = params.get("applicationId");

document.getElementById("applicationId").value = applicationId;

let role = localStorage.getItem("role");

if(!role || role.toUpperCase() !== "RECRUITER"){
    window.location.href="../index.html";
}

function logout(){
    localStorage.removeItem("role");
    localStorage.removeItem("token");
    window.location.href="../index.html";
}

const token = localStorage.getItem("token");


// LOAD APPLICANTS INTO DROPDOWN
async function loadApplicants(){

    const jobId = 1; // temporary job id

    const response = await fetch(API_BASE + "/recruiter/applicants/" + jobId,{
        headers:{
            "Authorization":"Bearer " + token
        }
    });

    const applicants = await response.json();

    const dropdown = document.getElementById("applicationId");

    dropdown.innerHTML = '<option value="">Select Candidate</option>';

    applicants.forEach(app => {

        const option = document.createElement("option");

        option.value = app.applicationId;

        option.text = app.rollNo + " - " + app.studentName;

        dropdown.appendChild(option);

    });

}



// SCHEDULE INTERVIEW
document.getElementById("scheduleForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const applicationId = document.getElementById("applicationId").value;
    const roundName = document.getElementById("roundName").value;
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;

    const response = await fetch(
        API_BASE + `/recruiter/schedule-interview?applicationId=${applicationId}&roundName=${roundName}&date=${date}&time=${time}&mode=ONLINE&location=GoogleMeet`,
        {
            method: "POST",
            headers:{
                "Authorization": "Bearer " + token
            }
        }
    );

    const msg = await response.text();

    alert(msg);

});


// LOAD DROPDOWN WHEN PAGE OPENS
loadApplicants();

</script>
<link rel="stylesheet" href="../css/chatbot.css">


<div class="chat-icon" onclick="toggleChat()">💬</div>

<div class="chat-container" id="chatContainer">

<div class="chat-header">
Placement Assistant
<span onclick="toggleChat()">✖</span>
</div>

<div class="chat-body" id="chatBody">
<div class="bot-message">
Hi 👋 Ask me about placements or eligibility.
</div>
</div>

<div class="chat-footer">
<input type="text" id="userInput"
placeholder="Type your question..."
onkeypress="handleKey(event)">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script src="../js/chatbot.js"></script>
</body>
</html>
