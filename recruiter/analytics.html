<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recruiter Analytics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
display:flex;
font-family: Arial, Helvetica, sans-serif;
}

.sidebar{
width:220px;
height:100vh;
background:#343a40;
color:white;
padding:20px;
}

.sidebar h4{
margin-bottom:20px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-bottom:5px;
border-radius:5px;
}

.sidebar a:hover{
background:#495057;
}

.content{
flex:1;
padding:25px;
background:#f5f6fa;
}

.card{
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>Recruiter Portal</h4>

<a href="dashboard.html"><i class="fa fa-chart-line"></i> Dashboard</a>

<a href="create-job.html"><i class="fa fa-plus"></i> Create Job</a>

<a href="manage-rounds.html"><i class="fa fa-layer-group"></i> Manage Rounds</a>

<a href="schedule-interview.html"><i class="fa fa-calendar"></i> Schedule Interview</a>

<a href="analytics.html"><i class="fa fa-chart-bar"></i> Analytics</a>

<button onclick="logout()" class="btn btn-danger mt-3 w-100">
Logout
</button>

</div>


<!-- Main Content -->

<div class="content">

<h2>Recruiter Analytics</h2>

<div class="row mt-4">

<div class="col-md-4">
<div class="card shadow p-4 text-center">
<h5>Total Jobs Posted</h5>
<h3 class="text-primary" id="jobsPosted">0</h3>
</div>
</div>

<div class="col-md-4">
<div class="card shadow p-4 text-center">
<h5>Total Applications</h5>
<h3 class="text-warning" id="totalApplications">0</h3>
</div>
</div>

<div class="col-md-4">
<div class="card shadow p-4 text-center">
<h5>Students Selected</h5>
<h3 class="text-success" id="selectedStudents">0</h3>
</div>
</div>

</div>

<div class="card shadow p-4 mt-5">

<h4>Applications per Job</h4>

<canvas id="applicationsChart"></canvas>

</div>

</div>

<script src="../js/api.js"></script>

<script>

let role = localStorage.getItem("role");

if(!role || role.toUpperCase() !== "RECRUITER"){
window.location.href = "../index.html";
}

function logout(){
localStorage.removeItem("role");
localStorage.removeItem("token");
window.location.href = "../index.html";
}

async function loadAnalytics(){

const response = await apiGet("/recruiter/analytics");

const stats = await response.json();

document.getElementById("jobsPosted").innerText = stats.jobs;
document.getElementById("totalApplications").innerText = stats.applications;
document.getElementById("selectedStudents").innerText = stats.selected;

const ctx = document.getElementById('applicationsChart');

new Chart(ctx, {
type: 'bar',
data: {
labels: ['In Progress','Rejected','Selected'],
datasets: [{
label: 'Candidates',
data: [
stats.inProgress,
stats.rejected,
stats.selected
],
backgroundColor: ['#ffc107','#dc3545','#198754']
}]
}
});

}

loadAnalytics();

</script>
<link rel="stylesheet" href="../css/chatbot.css">
<script src="../js/chatbot.js"></script>
<script src="../js/chatbot-widget.js"></script>

</body>
</html>
