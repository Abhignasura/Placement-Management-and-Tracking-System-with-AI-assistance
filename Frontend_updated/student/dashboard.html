<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
display:flex;
font-family: Arial, Helvetica, sans-serif;
}

.sidebar{
width:220px;
height:100vh;
background:#343a40;
color:white;
padding:20px;
}

.sidebar h4{
margin-bottom:20px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-bottom:5px;
border-radius:5px;
}

.sidebar a:hover{
background:#495057;
}

.content{
flex:1;
padding:25px;
background:#f5f6fa;
}

.card{
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>Student Portal</h4>

<a href="dashboard.html"><i class="fa fa-chart-line"></i> Dashboard</a>

<a href="apply-jobs.html"><i class="fa fa-briefcase"></i> Apply Jobs</a>

<a href="track-status.html"><i class="fa fa-file"></i> Track Status</a>

<a href="interview-schedule.html"><i class="fa fa-calendar"></i> Interview Schedule</a>

<button onclick="logout()" class="btn btn-danger mt-3 w-100">
Logout
</button>

</div>


<!-- Main Content -->

<div class="content">

<h2>Dashboard</h2>

<div class="row mt-4">

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h5>Applied Jobs</h5>
<h3 id="appliedJobs">0</h3>

</div>

</div>


<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h5>Upcoming Interviews</h5>
<h3 id="upcomingInterviews">0</h3>

</div>

</div>


<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h5>Offers</h5>
<h3 id="offers">0</h3>

</div>

</div>

</div>

</div>

<script src="../js/api.js"></script>

<script>

let role = localStorage.getItem("role");

if(!role || role.toUpperCase() !== "STUDENT"){
window.location.href="../index.html";
}

function logout(){
localStorage.removeItem("role");
localStorage.removeItem("token");
window.location.href="../index.html";
}

async function loadDashboard(){

const response = await apiGet("/application/dashboard");

const data = await response.json();

document.getElementById("appliedJobs").innerText =
data.applications.length;

document.getElementById("upcomingInterviews").innerText =
data.applications.filter(a=>a.status==="IN_PROGRESS").length;

document.getElementById("offers").innerText =
data.applications.filter(a=>a.status==="SELECTED").length;

}

loadDashboard();

</script>
<link rel="stylesheet" href="../css/chatbot.css">
<script src="../js/chatbot.js"></script>
<script src="../js/chatbot-widget.js"></script>
</body>
</html>
