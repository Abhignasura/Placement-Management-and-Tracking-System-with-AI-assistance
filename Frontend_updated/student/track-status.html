<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Application Status</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
display:flex;
font-family: Arial, Helvetica, sans-serif;
}

.sidebar{
width:220px;
height:100vh;
background:#343a40;
color:white;
padding:20px;
}

.sidebar h4{
margin-bottom:20px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-bottom:5px;
border-radius:5px;
}

.sidebar a:hover{
background:#495057;
}

.content{
flex:1;
padding:25px;
background:#f5f6fa;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>Student Portal</h4>

<a href="dashboard.html"><i class="fa fa-chart-line"></i> Dashboard</a>

<a href="apply-jobs.html"><i class="fa fa-briefcase"></i> Apply Jobs</a>

<a href="track-status.html"><i class="fa fa-file"></i> Track Status</a>

<a href="interview-schedule.html"><i class="fa fa-calendar"></i> Interview Schedule</a>

<button onclick="logout()" class="btn btn-danger mt-3 w-100">
Logout
</button>

</div>


<!-- Main Content -->

<div class="content">

<h2>Application Status</h2>

<table class="table table-hover table-striped shadow mt-4">

<thead class="table-dark">

<tr>
<th>Company</th>
<th>Role</th>
<th>Status</th>
</tr>

</thead>

<tbody id="statusTable"></tbody>

</table>

</div>

<script src="../js/api.js"></script>
<script>

const API_BASE = "http://localhost:8080/api";
const token = localStorage.getItem("token");

let role = localStorage.getItem("role");

if(!role || role.toUpperCase() !== "STUDENT"){
window.location.href = "../index.html";
}

function logout(){
localStorage.removeItem("role");
localStorage.removeItem("token");
window.location.href = "../index.html";
}

async function loadApplications(){

const response = await fetch(API_BASE + "/application/my-applications",{

headers:{
"Authorization":"Bearer " + token
}

});

const applications = await response.json();

const table = document.getElementById("statusTable");

table.innerHTML = "";

applications.forEach(app => {

const row = document.createElement("tr");

let badgeColor = "secondary";

if(app.status === "IN_PROGRESS"){
badgeColor = "warning";
}

if(app.status === "SELECTED"){
badgeColor = "success";
}

if(app.status === "REJECTED"){
badgeColor = "danger";
}

row.innerHTML = `
<td>${app.jobId}</td>
<td>Job Role</td>
<td>
<span class="badge bg-${badgeColor}">
${app.status}
</span>
</td>
`;

table.appendChild(row);

});

}

loadApplications();

</script>
<link rel="stylesheet" href="../css/chatbot.css">
<script src="../js/chatbot.js"></script>
<script src="../js/chatbot-widget.js"></script>
</body>
</html>
