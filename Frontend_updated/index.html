<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Placement Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0d6efd,#6c63ff);
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
}

.portal-title{
color:white;
margin-bottom:40px;
font-weight:bold;
}

.role-card{
padding:40px 20px;
border-radius:12px;
transition:all 0.3s ease;
cursor:pointer;
text-decoration:none;
color:black;
}

.role-card:hover{
transform:translateY(-10px);
box-shadow:0px 15px 30px rgba(0,0,0,0.3);
}

.role-icon{
font-size:40px;
margin-bottom:15px;
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.15);
animation:float 6s infinite ease-in-out;
}

.circle1{
width:200px;
height:200px;
top:10%;
left:10%;
}

.circle2{
width:150px;
height:150px;
bottom:15%;
right:15%;
animation-duration:8s;
}

.circle3{
width:100px;
height:100px;
bottom:10%;
left:20%;
animation-duration:7s;
}
.role-card{
padding:40px 20px;
border-radius:12px;
transition:all 0.35s ease;
cursor:pointer;
text-decoration:none;
color:black;
background:white;
}

.role-card:hover{
transform:translateY(-12px) scale(1.03);
box-shadow:
0 20px 40px rgba(0,0,0,0.25),
0 0 25px rgba(255,255,255,0.4);
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0px)}
}

</style>

</head>

<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>

<div class="container text-center">

<h2 class="portal-title">Placement Management System</h2>

<div class="row justify-content-center">

<!-- Student -->

<div class="col-md-3">

<a href="student-login.html" class="card role-card shadow">

<div class="role-icon text-primary">
<i class="fa fa-user-graduate"></i>
</div>

<h4>Student</h4>

</a>

</div>


<!-- Recruiter -->

<div class="col-md-3">

<a href="recruiter-login.html" class="card role-card shadow">

<div class="role-icon text-success">
<i class="fa fa-briefcase"></i>
</div>

<h4>Recruiter</h4>

</a>

</div>



<!-- Admin -->

<div class="col-md-3">

<a href="admin-login.html" class="card role-card shadow">

<div class="role-icon text-dark">
<i class="fa fa-user-shield"></i>
</div>

<h4>Admin</h4>

</a>

</div>

</div>

</div>

<link rel="stylesheet" href="css/chatbot.css">
<script src="js/chatbot.js"></script>
<script src="js/chatbot-widget.js"></script>

</body>
</html>
