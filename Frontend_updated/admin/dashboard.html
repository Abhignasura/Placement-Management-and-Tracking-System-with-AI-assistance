<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
display:flex;
font-family: Arial, Helvetica, sans-serif;
}

.sidebar{
width:220px;
height:100vh;
background:#343a40;
color:white;
padding:20px;
}

.sidebar h4{
margin-bottom:20px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-bottom:5px;
border-radius:5px;
}

.sidebar a:hover{
background:#495057;
}

.content{
flex:1;
padding:25px;
background:#f5f6fa;
}

.card{
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>Admin Portal</h4>

<a href="dashboard.html"><i class="fa fa-chart-line"></i> Dashboard</a>

<a href="approve-jobs.html"><i class="fa fa-check"></i> Approve Jobs</a>

<a href="deactivate-users.html"><i class="fa fa-user-slash"></i> Deactivate Users</a>

<a href="placement-analytics.html"><i class="fa fa-chart-bar"></i> Placement Analytics</a>

<a href="company-reports.html"><i class="fa fa-building"></i> Company Reports</a>

<a href="branch-reports.html"><i class="fa fa-file"></i> Branch Reports</a>

<button onclick="logout()" class="btn btn-danger mt-3 w-100">
Logout
</button>

</div>


<!-- Main Content -->

<div class="content">

<h2>Admin Dashboard</h2>

<div class="row mt-4">

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h5>Total Students</h5>
<h3 class="text-primary" id="totalStudents">0</h3>

</div>

</div>


<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h5>Total Companies</h5>
<h3 class="text-warning" id="totalCompanies">0</h3>

</div>

</div>


<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h5>Placements</h5>
<h3 class="text-success" id="placements">0</h3>

</div>

</div>

</div>

</div>

<script src="../js/api.js"></script>

<script>

const token = localStorage.getItem("token");

let role = localStorage.getItem("role");

if(!role || role.toUpperCase() !== "ADMIN"){
window.location.href = "../index.html";
}

async function loadDashboard(){

const companies = await apiGet("/admin/company-stats");
const companyData = await companies.json();

document.getElementById("totalCompanies").innerText =
Object.keys(companyData).length;

const response = await apiGet("/admin/placement-percentage");

const data = await response.json();

document.getElementById("totalStudents").innerText = data.totalStudents;
document.getElementById("placements").innerText = data.selectedStudents;

}

loadDashboard();

function logout(){
localStorage.removeItem("role");
localStorage.removeItem("token");
window.location.href = "../index.html";
}

</script>

<link rel="stylesheet" href="../css/chatbot.css">
<script src="../js/chatbot.js"></script>
<script src="../js/chatbot-widget.js"></script>

</body>
</html>
