<!DOCTYPE html>
<html>
<head>

<title>Placement Analytics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
display:flex;
font-family: Arial, Helvetica, sans-serif;
}

.sidebar{
width:220px;
height:100vh;
background:#343a40;
color:white;
padding:20px;
}

.sidebar h4{
margin-bottom:20px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-bottom:5px;
border-radius:5px;
}

.sidebar a:hover{
background:#495057;
}

.content{
flex:1;
padding:25px;
background:#f5f6fa;
}

.card{
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>Admin Portal</h4>

<a href="dashboard.html"><i class="fa fa-chart-line"></i> Dashboard</a>

<a href="approve-jobs.html"><i class="fa fa-check"></i> Approve Jobs</a>

<a href="deactivate-users.html"><i class="fa fa-user-slash"></i> Deactivate Users</a>

<a href="placement-analytics.html"><i class="fa fa-chart-bar"></i> Placement Analytics</a>

<a href="company-reports.html"><i class="fa fa-building"></i> Company Reports</a>

<a href="branch-reports.html"><i class="fa fa-file"></i> Branch Reports</a>

<button onclick="logout()" class="btn btn-danger mt-3 w-100">
Logout
</button>

</div>


<!-- Main Content -->

<div class="content">

<h2>Placement Analytics</h2>

<div class="row mt-4">

<div class="col-md-4">
<div class="card shadow p-4 text-center">
<h5>Total Students</h5>
<h3 class="text-primary">120</h3>
</div>
</div>

<div class="col-md-4">
<div class="card shadow p-4 text-center">
<h5>Placed Students</h5>
<h3 class="text-success">80</h3>
</div>
</div>

<div class="col-md-4">
<div class="card shadow p-4 text-center">
<h5>Placement Rate</h5>
<h3 class="text-warning">67%</h3>
</div>
</div>

</div>


<div class="card shadow p-4 mt-5">

<h4>Placements by Branch</h4>

<canvas id="placementChart"></canvas>

</div>

</div>


<script>

let role = localStorage.getItem("role");

if(!role){
window.location.href = "../index.html";
}

function logout(){
localStorage.removeItem("role");
window.location.href = "../index.html";
}


const ctx = document.getElementById('placementChart');

new Chart(ctx, {
type: 'bar',
data: {
labels: ['CSE', 'ECE', 'IT', 'MECH'],
datasets: [{
label: 'Students Placed',
data: [40, 20, 15, 5],
backgroundColor: ['#0d6efd','#198754','#ffc107','#dc3545']
}]
},
options: {
responsive: true
}
});

</script>

</body>
</html>
