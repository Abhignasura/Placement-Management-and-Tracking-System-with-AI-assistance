<!DOCTYPE html>
<html>
<head>

<title>Application Status</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
display:flex;
font-family: Arial, Helvetica, sans-serif;
}

.sidebar{
width:220px;
height:100vh;
background:#343a40;
color:white;
padding:20px;
}

.sidebar h4{
margin-bottom:20px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-bottom:5px;
border-radius:5px;
}

.sidebar a:hover{
background:#495057;
}

.content{
flex:1;
padding:25px;
background:#f5f6fa;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>Student Portal</h4>

<a href="dashboard.html"><i class="fa fa-chart-line"></i> Dashboard</a>

<a href="apply-jobs.html"><i class="fa fa-briefcase"></i> Apply Jobs</a>

<a href="track-status.html"><i class="fa fa-file"></i> Track Status</a>

<a href="interview-schedule.html"><i class="fa fa-calendar"></i> Interview Schedule</a>

<button onclick="logout()" class="btn btn-danger mt-3 w-100">
Logout
</button>

</div>


<!-- Main Content -->

<div class="content">

<h2>Application Status</h2>

<table class="table table-hover table-striped shadow mt-4">

<thead class="table-dark">

<tr>
<th>Company</th>
<th>Role</th>
<th>Status</th>
</tr>

</thead>

<tbody>

<tr>
<td>TCS</td>
<td>Software Engineer</td>
<td><span class="badge bg-warning">Round 2</span></td>
</tr>

<tr>
<td>Infosys</td>
<td>Developer</td>
<td><span class="badge bg-success">Selected</span></td>
</tr>

</tbody>

</table>

</div>


<script>

let role = localStorage.getItem("role");

if(!role){
window.location.href = "../index.html";
}

function logout(){
localStorage.removeItem("role");
window.location.href = "../index.html";
}

</script>

</body>
</html>
