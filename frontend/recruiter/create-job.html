<!DOCTYPE html>
<html>
<head>

<title>Create Job</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
display:flex;
font-family: Arial, Helvetica, sans-serif;
}

.sidebar{
width:220px;
height:100vh;
background:#343a40;
color:white;
padding:20px;
}

.sidebar h4{
margin-bottom:20px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-bottom:5px;
border-radius:5px;
}

.sidebar a:hover{
background:#495057;
}

.content{
flex:1;
padding:25px;
background:#f5f6fa;
}

.card{
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>Recruiter Portal</h4>

<a href="dashboard.html"><i class="fa fa-chart-line"></i> Dashboard</a>

<a href="create-job.html"><i class="fa fa-plus"></i> Create Job</a>

<a href="manage-rounds.html"><i class="fa fa-layer-group"></i> Manage Rounds</a>

<a href="schedule-interview.html"><i class="fa fa-calendar"></i> Schedule Interview</a>

<a href="analytics.html"><i class="fa fa-chart-bar"></i> Analytics</a>

<button onclick="logout()" class="btn btn-danger mt-3 w-100">
Logout
</button>

</div>


<!-- Main Content -->

<div class="content">

<h2>Create Job</h2>

<div class="card shadow p-4 mt-4">

<form>

<div class="mb-3">
<label class="form-label">Company Name</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Job Role</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Package</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Eligibility CGPA</label>
<input type="text" class="form-control">
</div>

<button class="btn btn-success">
<i class="fa fa-plus"></i> Create Job
</button>

</form>

</div>

</div>


<script>

let role = localStorage.getItem("role");

if(!role){
window.location.href = "../index.html";
}

function logout(){
localStorage.removeItem("role");
window.location.href = "../index.html";
}

</script>

</body>
</html>
